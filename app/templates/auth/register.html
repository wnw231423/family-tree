{% extends "base.html" %}
{% block title %}注册 - 族谱管理系统{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card">
            <div class="card-body">
                <h1 class="h4 mb-3">用户注册</h1>
                <form method="post">
                    <div class="mb-3">
                        <label class="form-label" for="username">用户名</label>
                        <input class="form-control" id="username" name="username" maxlength="50" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="password">密码</label>
                        <input class="form-control" id="password" name="password" type="password" required>
                    </div>
                    <button class="btn btn-primary w-100" type="submit">注册</button>
                </form>
                <p class="mt-3 mb-0 text-secondary small">
                    已有账号？<a href="{{ url_for('auth.login') }}">登录</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}族谱管理系统{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f6f7f9; }
        .page-shell { max-width: 1180px; }
        .tree {
            --tree-line: #aab3c2;
            --tree-card-border: #d8dee8;
            --tree-card-bg: #fff;
            --tree-muted: #667085;
        }
        .tree-chart {
            overflow: auto;
            padding: 1.25rem 1rem 1.75rem;
        }
        .tree-chart ul {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            list-style: none;
            margin: 0;
            min-width: 100%;
            padding: 1.6rem 0 0;
            position: relative;
            width: max-content;
        }
        .tree-chart ul ul::before {
            border-left: 1px solid var(--tree-line);
            content: "";
            height: 1.6rem;
            left: 50%;
            position: absolute;
            top: 0;
        }
        .tree-chart li {
            align-items: center;
            display: flex;
            flex: 0 0 auto;
            flex-direction: column;
            min-width: max-content;
            padding: 1.6rem 0 0;
            position: relative;
            text-align: center;
        }
        .tree-chart li::before,
        .tree-chart li::after {
            border-top: 1px solid var(--tree-line);
            content: "";
            height: 1.6rem;
            position: absolute;
            right: 50%;
            top: 0;
            width: calc(50% + .75rem);
        }
        .tree-chart li::after {
            border-left: 1px solid var(--tree-line);
            left: 50%;
            right: auto;
        }
        .tree-chart li:only-child {
            padding-top: 0;
        }
        .tree-chart li:only-child::before,
        .tree-chart li:only-child::after,
        .tree-chart > ul::before,
        .tree-chart > ul > li::before,
        .tree-chart > ul > li::after {
            display: none;
        }
        .tree-chart li:first-child::before,
        .tree-chart li:last-child::after {
            border: 0 none;
        }
        .tree-chart li:first-child::after {
            border-radius: .5rem 0 0 0;
        }
        .tree-chart li:last-child::before {
            border-right: 1px solid var(--tree-line);
            border-radius: 0 .5rem 0 0;
        }
        .tree-child-groups {
            align-items: flex-start;
            gap: 2rem;
        }
        .tree-child-group {
            padding-top: 1.6rem;
        }
        .tree-child-group > ul {
            gap: 1.25rem;
        }
        .tree-group-label {
            background: #eef2f7;
            border: 1px solid #d8dee8;
            border-radius: 999px;
            color: var(--tree-muted);
            font-size: .74rem;
            line-height: 1.2;
            margin-bottom: .4rem;
            max-width: 11rem;
            overflow: hidden;
            padding: .28rem .65rem;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .tree-family {
            align-items: stretch;
            background: var(--tree-card-bg);
            border: 1px solid var(--tree-card-border);
            border-radius: .5rem;
            box-shadow: 0 1px 2px rgba(15, 23, 42, .06);
            display: inline-flex;
            flex-wrap: wrap;
            gap: .35rem;
            justify-content: center;
            max-width: 22rem;
            min-width: 12rem;
            padding: .5rem;
            text-align: center;
        }
        .tree-person {
            border: 1px solid #e5eaf1;
            border-radius: .4rem;
            min-width: 9.25rem;
            padding: .42rem .6rem;
        }
        .tree-person-main {
            border-color: transparent;
        }
        .tree-person a,
        .tree-spouse-chip {
            color: #1f2937;
            display: block;
            font-weight: 600;
            text-decoration: none;
        }
        .tree-person a:hover,
        .tree-spouse-chip:hover {
            color: #0d6efd;
            text-decoration: underline;
        }
        .tree-person-male {
            border-top: 3px solid #4f8cff;
        }
        .tree-person-female {
            border-top: 3px solid #f06aa6;
        }
        .tree-marriage-line {
            align-self: center;
            background: #c6ceda;
            flex: 0 0 1.1rem;
            height: 1px;
        }
        .tree-remarriages {
            border-top: 1px dashed #d8dee8;
            display: flex;
            flex-basis: 100%;
            flex-wrap: wrap;
            gap: .35rem;
            justify-content: center;
            padding-top: .45rem;
        }
        .tree-spouse-chip {
            background: #f8fafc;
            border: 1px solid #e5eaf1;
            border-radius: 999px;
            font-size: .74rem;
            line-height: 1.2;
            max-width: 9.5rem;
            overflow: hidden;
            padding: .28rem .55rem;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .tree-meta {
            color: var(--tree-muted);
            font-size: .78rem;
            line-height: 1.35;
            margin-top: .25rem;
            white-space: nowrap;
        }
        .tree-count {
            color: #495057;
            font-size: .76rem;
            flex-basis: 100%;
            line-height: 1.35;
            margin-top: .25rem;
        }
        .tree-count {
            border-top: 1px dashed #d8dee8;
            padding-top: .35rem;
        }
        .tree-expand {
            display: inline-block;
            flex-basis: 100%;
            font-size: .76rem;
            margin-top: .35rem;
            text-decoration: none;
        }
        .table-fixed { table-layout: fixed; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg bg-white border-bottom">
    <div class="container page-shell">
        <a class="navbar-brand fw-semibold" href="{{ url_for('routes.dashboard') }}">族谱管理系统</a>
        <div class="ms-auto d-flex align-items-center gap-3">
            {% if g.user %}
                <span class="text-secondary small">{{ g.user.username }}</span>
                <form method="post" action="{{ url_for('auth.logout') }}">
                    <button class="btn btn-outline-secondary btn-sm" type="submit">退出</button>
                </form>
            {% else %}
                <a class="btn btn-outline-secondary btn-sm" href="{{ url_for('auth.login') }}">登录</a>
                <a class="btn btn-primary btn-sm" href="{{ url_for('auth.register') }}">注册</a>
            {% endif %}
        </div>
    </div>
</nav>

<main class="container page-shell py-4">
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="关闭"></button>
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

{% extends "base.html" %}
{% block title %}{% if genealogy %}编辑族谱{% else %}新建族谱{% endif %} - 族谱管理系统{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="h3 mb-0">{% if genealogy %}编辑族谱{% else %}新建族谱{% endif %}</h1>
    <a class="btn btn-outline-secondary" href="{{ url_for('routes.dashboard') }}">返回 Dashboard</a>
</div>

<div class="card">
    <div class="card-body">
        <form method="post">
            <div class="row g-3">
                <div class="col-md-5">
                    <label class="form-label" for="name">谱名</label>
                    <input class="form-control" id="name" name="name" maxlength="100" value="{{ genealogy.name if genealogy else '' }}" required>
                </div>
                <div class="col-md-3">
                    <label class="form-label" for="surname">姓氏</label>
                    <input class="form-control" id="surname" name="surname" maxlength="20" value="{{ genealogy.surname if genealogy else '' }}" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label" for="compiled_at">修谱时间</label>
                    <input class="form-control" id="compiled_at" name="compiled_at" type="date" value="{{ genealogy.compiled_at if genealogy and genealogy.compiled_at else '' }}">
                </div>
            </div>
            <div class="mt-4">
                <button class="btn btn-primary" type="submit">保存</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
